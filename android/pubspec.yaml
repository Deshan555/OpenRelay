name: openrelay
description: "OpenRelay SMS Gateway - Android companion app"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.0
  web_socket_channel: ^3.0.0

  # Local Storage
  shared_preferences: ^2.3.0
  sqflite: ^2.3.0
  path: ^1.9.0

  # Background Service
  flutter_background_service: ^5.0.5
  flutter_local_notifications: ^18.0.0

  # Device Info & Sensors
  battery_plus: ^6.0.0
  connectivity_plus: ^6.0.0
  device_info_plus: ^11.0.0
  permission_handler: ^11.3.0
  geolocator: ^13.0.0

  # State Management
  provider: ^6.1.0

  # UI
  google_fonts: ^6.2.0
  flutter_animate: ^4.5.0

  # Utils
  intl: ^0.20.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
